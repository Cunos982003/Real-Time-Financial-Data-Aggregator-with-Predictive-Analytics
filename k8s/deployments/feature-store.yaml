apiVersion: apps/v1
kind: Deployment
metadata:
  name: feature-store
  namespace: fintech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: feature-store
  template:
    metadata:
      labels:
        app: feature-store
    spec:
      containers:
        - name: feature-store
          image: fintech/feature-store-service:latest
          ports:
            - containerPort: 8084
          env:
            - name: POSTGRES_HOST
              value: postgres
            - name: REDIS_HOST
              value: redis
          envFrom:
            - configMapRef:
                name: fintech-config
            - secretRef:
                name: fintech-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10