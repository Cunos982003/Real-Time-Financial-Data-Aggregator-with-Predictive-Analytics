apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-processing
  namespace: fintech
spec:
  replicas: 3
  selector:
    matchLabels:
      app: stream-processing
  template:
    metadata:
      labels:
        app: stream-processing
    spec:
      containers:
        - name: stream-processing
          image: fintech/stream-processing-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
          envFrom:
            - configMapRef:
                name: fintech-config
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 30