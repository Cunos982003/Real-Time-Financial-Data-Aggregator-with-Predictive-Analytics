global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/prometheus-alerts.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'data-ingestion'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['data-ingestion:8081']

  - job_name: 'stream-processing'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['stream-processing:8082']

  - job_name: 'ml-inference'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ml-inference:8083']

  - job_name: 'feature-store'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['feature-store:8084']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']